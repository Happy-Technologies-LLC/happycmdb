<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>HappyCMDB - Open-source Enterprise Configuration Management</title>
    <meta name="title" content="HappyCMDB - Open-source Enterprise Configuration Management" />
    <meta name="description" content="Discover, track, and manage your configuration items across multi-cloud environments with HappyCMDB - an open-source CMDB platform for modern infrastructure." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://happycmdb.io/" />
    <meta property="og:title" content="HappyCMDB - Open-source Enterprise Configuration Management" />
    <meta property="og:description" content="Discover, track, and manage your configuration items across multi-cloud environments with HappyCMDB - an open-source CMDB platform for modern infrastructure." />
    <meta property="og:image" content="/assets/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://happycmdb.io/" />
    <meta property="twitter:title" content="HappyCMDB - Open-source Enterprise Configuration Management" />
    <meta property="twitter:description" content="Discover, track, and manage your configuration items across multi-cloud environments with HappyCMDB - an open-source CMDB platform for modern infrastructure." />
    <meta property="twitter:image" content="/assets/logo.png" />
    <style>
      /* Prevent flash of unstyled content */
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
      }

      /* Loading spinner for initial page load */
      .app-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: #f5f5f5;
      }

      .app-loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #e0e0e0;
        border-top-color: #1976d2;
        border-radius: 50%;
        animation: spinner 0.8s linear infinite;
      }

      @keyframes spinner {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
