apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: happycmdb-cmdb
  labels:
    app: api-server
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
        component: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - api-server
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api-server
          image: happycmdb/api-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: NEO4J_URI
              value: "neo4j://neo4j-0.neo4j-cluster.happycmdb-cmdb.svc.cluster.local:7687,neo4j://neo4j-1.neo4j-cluster.happycmdb-cmdb.svc.cluster.local:7687,neo4j://neo4j-2.neo4j-cluster.happycmdb-cmdb.svc.cluster.local:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: neo4j-password
            - name: POSTGRES_HOST
              value: "postgres-primary.happycmdb-cmdb.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "cmdb"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: postgres-password
            - name: REDIS_CLUSTER_NODES
              value: "redis-0.redis-cluster.happycmdb-cmdb.svc.cluster.local:6379,redis-1.redis-cluster.happycmdb-cmdb.svc.cluster.local:6379,redis-2.redis-cluster.happycmdb-cmdb.svc.cluster.local:6379,redis-3.redis-cluster.happycmdb-cmdb.svc.cluster.local:6379,redis-4.redis-cluster.happycmdb-cmdb.svc.cluster.local:6379,redis-5.redis-cluster.happycmdb-cmdb.svc.cluster.local:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: redis-password
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka.happycmdb-cmdb.svc.cluster.local:9092,kafka-1.kafka.happycmdb-cmdb.svc.cluster.local:9092,kafka-2.kafka.happycmdb-cmdb.svc.cluster.local:9092"
            # v3.0 Environment Variables
            - name: ENABLE_ITIL
              value: "true"
            - name: ENABLE_TBM
              value: "true"
            - name: ENABLE_BSM
              value: "true"
            - name: ENABLE_AI_DISCOVERY
              value: "true"
            # Cloud Cost Integration
            - name: AWS_COST_EXPLORER_ENABLED
              value: "true"
            - name: AZURE_COST_MGMT_ENABLED
              value: "true"
            - name: GCP_BILLING_ENABLED
              value: "true"
            # Metabase Integration
            - name: METABASE_URL
              value: "http://metabase.happycmdb-cmdb.svc.cluster.local:3000"
            - name: METABASE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: metabase-api-key
                  optional: true
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: happycmdb-cmdb
  labels:
    app: api-server
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: api-server
