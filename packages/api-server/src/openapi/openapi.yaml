                  description: Scan production subnet for devices
                  provider: nmap
                  method: agent
                  agent_id: agent-prod-01
                  config:
                    target_networks: ["10.0.0.0/24"]
                    scan_type: comprehensive
                  schedule: "0 2 * * *"
                  is_active: true
