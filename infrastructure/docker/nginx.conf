# =============================================================================
# HappyCMDB - Nginx SSL/TLS Configuration
# =============================================================================
# Production-ready nginx configuration with:
# - HTTPS/SSL support with Let's Encrypt
# - HTTP to HTTPS redirect
# - Security headers (HSTS, CSP, XSS protection)
# - Reverse proxy to API server
# - Gzip compression
# - Static asset caching
# =============================================================================

# Rate Limiting Zones
# Note: These provide protection at the nginx layer in addition to application-level rate limiting
# Commented out - requires http block context or use application-level rate limiting only
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
# limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
# limit_req_zone $binary_remote_addr zone=graphql_limit:10m rate=50r/s;

# Connection Limiting
# limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream API Server
upstream api_backend {
    server api-server:3000;
    keepalive 32;
}

# =============================================================================
# HTTP Server (Port 80)
# =============================================================================
# Redirects all HTTP traffic to HTTPS
# Serves ACME challenge for Let's Encrypt certificate validation
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS Server (Port 443)
# =============================================================================
# Main SSL/TLS server with security headers and reverse proxy
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------------------------------------
    # SSL/TLS Configuration
    # -----------------------------------------------------------------------------
    # Certificate paths (Let's Encrypt or custom certificates)
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Optional: Diffie-Hellman parameters for perfect forward secrecy
    # Generate with: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 4096
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # SSL Protocols (TLS 1.2 and 1.3 only - disable older versions)
    ssl_protocols TLSv1.2 TLSv1.3;

    # SSL Ciphers (modern, secure ciphersuites)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL Session Settings (improve performance)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP Stapling (for certificate validation)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -----------------------------------------------------------------------------
    # Security Headers
    # -----------------------------------------------------------------------------
    # HTTP Strict Transport Security (HSTS)
    # Force HTTPS for 1 year, include subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy (CSP)
    # Prevent XSS attacks by controlling resource loading
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.happycmdb.io ws: wss:; frame-ancestors 'none';" always;

    # X-Frame-Options (prevent clickjacking)
    add_header X-Frame-Options "DENY" always;

    # X-Content-Type-Options (prevent MIME sniffing)
    add_header X-Content-Type-Options "nosniff" always;

    # X-XSS-Protection (legacy XSS protection)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer Policy (control referrer information)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy (formerly Feature-Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # -----------------------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------------------
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # -----------------------------------------------------------------------------
    # Compression
    # -----------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # -----------------------------------------------------------------------------
    # API Reverse Proxy
    # -----------------------------------------------------------------------------
    # Proxy all /api requests to backend API server
    location /api/ {
        # Rate limiting (nginx layer + application layer)
        limit_req zone=api_limit burst=50 nodelay;
        limit_conn conn_limit 20;
        limit_req_status 429;

        # Request size limits
        client_max_body_size 10M;
        client_body_buffer_size 128k;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Keep-alive
        proxy_set_header Connection "";
    }

    # Authentication endpoints (stricter rate limits)
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphQL endpoint
    location /graphql {
        # Rate limiting for GraphQL
        limit_req zone=graphql_limit burst=20 nodelay;
        limit_req_status 429;

        # Request size limits (GraphQL queries can be large)
        client_max_body_size 5M;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # -----------------------------------------------------------------------------
    # Static Files
    # -----------------------------------------------------------------------------
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Static assets with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router support (SPA)
    # Serve index.html for all non-API routes
    location / {
        try_files $uri $uri/ /index.html;

        # Cache control for HTML files
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # -----------------------------------------------------------------------------
    # Error Pages
    # -----------------------------------------------------------------------------
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
