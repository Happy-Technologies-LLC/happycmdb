# =============================================================================
# Grafana Dashboard Provisioning - HappyCMDB
# =============================================================================
# This file automatically provisions all HappyCMDB dashboards when Grafana
# starts. Dashboards are loaded from the /dashboards directory.
# =============================================================================

apiVersion: 1

providers:
  # CMDB Data Mart Dashboards (PostgreSQL/TimescaleDB)
  - name: 'HappyCMDB Dashboards'
    orgId: 1
    folder: 'HappyCMDB'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/cmdb
      foldersFromFilesStructure: false

  # Prometheus Monitoring Dashboards (Legacy)
  - name: 'HappyCMDB Monitoring Dashboards'
    orgId: 1
    folder: 'HappyCMDB Monitoring'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/monitoring
      foldersFromFilesStructure: false
