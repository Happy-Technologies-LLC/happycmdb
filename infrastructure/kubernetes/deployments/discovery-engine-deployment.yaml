apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-engine
  namespace: happycmdb-cmdb
  labels:
    app: discovery-engine
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: discovery-engine
  template:
    metadata:
      labels:
        app: discovery-engine
        component: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - discovery-engine
                topologyKey: kubernetes.io/hostname
      containers:
        - name: discovery-engine
          image: happycmdb/discovery-engine:latest
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEO4J_URI
              value: "neo4j://neo4j-0.neo4j-cluster.happycmdb-cmdb.svc.cluster.local:7687,neo4j://neo4j-1.neo4j-cluster.happycmdb-cmdb.svc.cluster.local:7687,neo4j://neo4j-2.neo4j-cluster.happycmdb-cmdb.svc.cluster.local:7687"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: neo4j-password
            - name: POSTGRES_HOST
              value: "postgres-primary.happycmdb-cmdb.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "cmdb"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: postgres-password
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka.happycmdb-cmdb.svc.cluster.local:9092,kafka-1.kafka.happycmdb-cmdb.svc.cluster.local:9092,kafka-2.kafka.happycmdb-cmdb.svc.cluster.local:9092"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: cloud-credentials
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-credentials
                  key: aws-secret-access-key
            - name: AWS_REGION
              value: "us-east-1"
            - name: AZURE_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: cloud-credentials
                  key: azure-tenant-id
                  optional: true
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: cloud-credentials
                  key: azure-client-id
                  optional: true
            - name: AZURE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: cloud-credentials
                  key: azure-client-secret
                  optional: true
            - name: GCP_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: cloud-credentials
                  key: gcp-project-id
                  optional: true
            # v3.0 Environment Variables
            - name: ENABLE_ITIL_ENRICHMENT
              value: "true"
            - name: ENABLE_TBM_ENRICHMENT
              value: "true"
            - name: ENABLE_BSM_ENRICHMENT
              value: "true"
            - name: ENABLE_AI_DISCOVERY
              value: "true"
            # AI Provider Configuration
            - name: AI_PROVIDER
              value: "openai"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-credentials
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-credentials
                  key: anthropic-api-key
                  optional: true
            - name: AI_DISCOVERY_ENABLED
              value: "true"
            - name: AI_ANOMALY_DETECTION_ENABLED
              value: "true"
            - name: AI_PATTERN_LEARNING_ENABLED
              value: "true"
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: discovery-engine
  namespace: happycmdb-cmdb
  labels:
    app: discovery-engine
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: metrics
  selector:
    app: discovery-engine
