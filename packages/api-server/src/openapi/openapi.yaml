                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reconciliation/merge:
    post:
      tags: [Reconciliation]
      summary: Merge CI
      description: Reconcile discovered CI into CMDB
      operationId: mergeCI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeRequest'
      responses:
        '200':
          description: CI merged successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ci:
                    $ref: '#/components/schemas/CI'
                  action:
                    type: string
                    enum: [created, updated, merged]
                  conflicts:
                    type: array
                    items:
                      type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reconciliation/conflicts:
    get:
      tags: [Reconciliation]
      summary: List conflicts
      description: Get pending reconciliation conflicts
      operationId: listConflicts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, resolved, dismissed]
            default: pending
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of conflicts
          content:
            application/json:
              schema:
                type: object
                properties:
                  conflicts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReconciliationConflict'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reconciliation/conflicts/{id}/resolve:
    post:
      tags: [Reconciliation]
      summary: Resolve conflict
      description: Resolve a specific reconciliation conflict
      operationId: resolveConflict
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resolution]
              properties:
                resolution:
                  type: string
                  enum: [accept_source, accept_target, merge]
                merged_data:
                  type: object
      responses:
        '200':
          description: Conflict resolved
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /reconciliation/rules:
    get:
      tags: [Reconciliation]
      summary: List reconciliation rules
      operationId: listReconciliationRules
      responses:
        '200':
          description: Reconciliation rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReconciliationRule'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Reconciliation]
      summary: Create reconciliation rule
      operationId: createReconciliationRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReconciliationRuleInput'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationRule'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /reconciliation/lineage/{ci_id}:
    get:
      tags: [Reconciliation]
      summary: Get CI lineage
      description: Get source lineage for a CI
      operationId: getCILineage
      parameters:
        - name: ci_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: CI lineage
          content:
            application/json:
              schema:
                type: object
                properties:
                  ci_id:
                    type: string
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        source:
                          type: string
                        discovered_at:
                          type: string
                          format: date-time
                        authority_score:
                          type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # =============================================================================
  # ANALYTICS
  # =============================================================================
  /analytics/dashboard:
    get:
      tags: [Analytics]
      summary: Dashboard statistics
      description: Get summary statistics for dashboard
      operationId: getDashboardStats
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_cis:
                    type: integer
                  total_relationships:
                    type: integer
                  active_discovery_jobs:
                    type: integer
                  recent_anomalies:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/ci-counts:
    get:
      tags: [Analytics]
      summary: CI counts by type
      operationId: getCICountsByType
      responses:
        '200':
          description: CI type counts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      $ref: '#/components/schemas/CIType'
                    count:
                      type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /analytics/discovery-stats:
    get:
      tags: [Analytics]
      summary: Discovery statistics
      description: Get discovery job statistics
      operationId: getDiscoveryStats
      parameters:
        - name: _start_date
          in: query
          schema:
            type: string
            format: date-time
        - name: _end_date
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Discovery statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_jobs:
                    type: integer
                  successful_jobs:
                    type: integer
                  failed_jobs:
                    type: integer
                  cis_discovered:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  # =============================================================================
  # ANOMALIES
  # =============================================================================
  /anomalies/recent:
    get:
      tags: [Anomalies]
      summary: Get recent anomalies
      description: Retrieve recently detected anomalies
      operationId: getRecentAnomalies
      parameters:
        - name: hours
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        '200':
          description: Recent anomalies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Anomaly'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /anomalies/ci/{ciId}:
    get:
      tags: [Anomalies]
      summary: Get anomalies for CI
      description: Get all anomalies detected for a specific CI
      operationId: getAnomaliesForCI
      parameters:
        - name: ciId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        '200':
          description: CI anomalies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Anomaly'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /anomalies/stats:
    get:
      tags: [Anomalies]
      summary: Anomaly statistics
      description: Get anomaly detection statistics
      operationId: getAnomalyStats
      responses:
        '200':
          description: Anomaly stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_anomalies:
                    type: integer
                  by_type:
                    type: object
                  by_status:
                    type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /anomalies/{id}/status:
    patch:
      tags: [Anomalies]
      summary: Update anomaly status
      description: Update the investigation status of an anomaly
      operationId: updateAnomalyStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [investigating, resolved, false_positive, confirmed, ignored]
                resolved_by:
                  type: string
      responses:
        '200':
          description: Status updated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /anomalies/detect:
    post:
      tags: [Anomalies]
      summary: Run anomaly detection
      description: Manually trigger anomaly detection job
      operationId: runAnomalyDetection
      responses:
        '202':
          description: Detection job started
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  message:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  # =============================================================================
  # JOBS
  # =============================================================================
  /jobs/stats:
    get:
      tags: [Jobs]
      summary: Get job statistics
      description: Overall job statistics across all queues
      operationId: getJobStats
      responses:
        '200':
          description: Job statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_jobs:
                    type: integer
                  active_jobs:
                    type: integer
                  completed_jobs:
                    type: integer
                  failed_jobs:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

  /jobs/discovery:
    get:
      tags: [Jobs]
      summary: List discovery jobs
      description: Get all discovery jobs
      operationId: listDiscoveryJobs
      responses:
        '200':
          description: Discovery jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /jobs/discovery/{provider}:
    post:
      tags: [Jobs]
      summary: Trigger discovery
      description: Manually trigger discovery for a provider
      operationId: triggerDiscovery
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/DiscoveryProvider'
      responses:
        '202':
          description: Discovery job queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                  queue:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /jobs/{queueName}/{jobId}:
    get:
      tags: [Jobs]
      summary: Get job status
      description: Get detailed status of a specific job
      operationId: getJobStatus
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Jobs]
      summary: Cancel job
      description: Cancel a running or queued job
      operationId: cancelJob
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Job cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /jobs/{queueName}/{jobId}/retry:
    post:
      tags: [Jobs]
      summary: Retry failed job
      description: Retry a failed job
      operationId: retryJob
      parameters:
        - name: queueName
          in: path
          required: true
          schema:
            type: string
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Job requeued
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # =============================================================================
  # HEALTH
  # =============================================================================
  /cmdb-health:
    get:
      tags: [Health]
      summary: Health check
      description: Get overall system health status
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: System healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [healthy, degraded, unhealthy]
                  timestamp:
                    type: string
                    format: date-time
                  services:
                    type: object
                    properties:
                      neo4j:
                        type: string
                        enum: [up, down]
                      postgres:
                        type: string
                        enum: [up, down]
                      redis:
                        type: string
                        enum: [up, down]
        '503':
          description: System unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [unhealthy]
                  errors:
                    type: array
                    items:
                      type: string

# =============================================================================
# REUSABLE COMPONENTS
# =============================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from /auth/login endpoint
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key from /auth/api-keys endpoint

  parameters:
    CIId:
      name: id
      in: path
      required: true
      description: CI unique identifier
      schema:
        type: string
      example: srv-prod-web-01

    KeyId:
      name: keyId
      in: path
      required: true
      description: API key ID
      schema:
        type: string
        format: uuid

    Limit:
      name: _limit
      in: query
      description: Maximum number of results
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100

    Offset:
      name: _offset
      in: query
      description: Number of results to skip
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Validation Error
            message: Invalid CI type provided
            details:
              - field: _type
                error: must be one of [server, virtual-machine, ...]

    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Unauthorized
            message: Invalid or expired JWT token

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: Not Found
            message: CI with ID 'srv-prod-web-01' not found

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Maximum requests per window
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Remaining requests
        X-RateLimit-Reset:
          schema:
            type: integer
          description: Unix timestamp when limit resets
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # =========================================================================
    # CORE MODELS
    # =========================================================================
    CI:
      type: object
      required: [_id, name, _type, _status, _created_at, _updated_at, _discovered_at]
      properties:
        _id:
          type: string
          description: Unique identifier
          example: srv-prod-web-01
        external_id:
          type: string
          description: External system ID (e.g., AWS instance ID)
          example: i-0123456789abcdef0
        name:
          type: string
          description: Human-readable name
          example: Production Web Server 01
        _type:
          $ref: '#/components/schemas/CIType'
        _status:
          $ref: '#/components/schemas/CIStatus'
        environment:
          $ref: '#/components/schemas/Environment'
        _created_at:
          type: string
          format: date-time
          description: When CI was created in CMDB
        _updated_at:
          type: string
          format: date-time
          description: Last update timestamp
        _discovered_at:
          type: string
          format: date-time
          description: When CI was discovered
        _metadata:
          type: object
          additionalProperties: true
          description: Additional attributes and metadata
          example:
            hostname: web01.example.com
            ip_address: 192.168.1.10
            os: Ubuntu 22.04
            cpu_cores: 8
            memory_gb: 32

    CIInput:
      type: object
      required: [_id, name, _type]
      properties:
        _id:
          type: string
        external_id:
          type: string
        name:
          type: string
        _type:
          $ref: '#/components/schemas/CIType'
        status:
          $ref: '#/components/schemas/CIStatus'
        environment:
          $ref: '#/components/schemas/Environment'
        discovered_at:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true

    CIType:
      type: string
      enum:
        - server
        - virtual-machine
        - container
        - application
        - service
        - database
        - network-device
        - storage
        - load-balancer
        - cloud-resource
        - alert
        - vulnerability
        - software
        - detection
        - incident
        - hardware-component
        - mobile-device
        - policy
        - configuration
        - user
        - group
        - organizational-unit
        - collection
        - update

    CIStatus:
      type: string
      enum: [active, inactive, maintenance, decommissioned]

    Environment:
      type: string
      enum: [production, staging, development, test]

    Relationship:
      type: object
      required: [_from_id, _to_id, _type]
      properties:
        _from_id:
          type: string
          description: Source CI ID
        _to_id:
          type: string
          description: Target CI ID
        _type:
          $ref: '#/components/schemas/RelationshipType'
        properties:
          type: object
          additionalProperties: true
          description: Additional relationship metadata

    RelationshipInput:
      type: object
      required: [_from_id, _to_id, _type]
      properties:
        _from_id:
          type: string
        _to_id:
          type: string
        _type:
          $ref: '#/components/schemas/RelationshipType'
        properties:
          type: object
          additionalProperties: true

    RelationshipType:
      type: string
      enum:
        - DEPENDS_ON
        - HOSTS
        - CONNECTS_TO
        - USES
        - OWNED_BY
        - PART_OF
        - LOCATED_IN
        - DEPLOYED_ON
        - BACKED_UP_BY
        - DETECTED_ON
        - AFFECTS
        - INSTALLED_ON
        - CONTAINS
        - ASSIGNED_TO
        - APPLIES_TO
        - MEMBER_OF
        - REQUIRED_BY
        - HOSTED_ON

    # =========================================================================
    # AUTHENTICATION
    # =========================================================================
    User:
      type: object
      properties:
        _id:
          type: string
          format: uuid
        _username:
          type: string
        _email:
          type: string
          format: email
        _role:
          type: string
          enum: [admin, user, readonly]
        _enabled:
          type: boolean
        _createdAt:
          type: string
          format: date-time

    ApiKey:
      type: object
      properties:
        _id:
          type: string
          format: uuid
        _name:
          type: string
        _role:
          type: string
        _enabled:
          type: boolean
        _createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time

    # =========================================================================
    # CREDENTIALS
    # =========================================================================
    Credential:
      type: object
      required: [id, name, protocol, scope, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        protocol:
          $ref: '#/components/schemas/AuthProtocol'
        scope:
          $ref: '#/components/schemas/CredentialScope'
        credentials:
          type: object
          description: Encrypted credentials (redacted in responses)
        affinity:
          $ref: '#/components/schemas/CredentialAffinity'
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
        last_used_at:
          type: string
          format: date-time

    CredentialSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        protocol:
          $ref: '#/components/schemas/AuthProtocol'
        scope:
          $ref: '#/components/schemas/CredentialScope'
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    CreateCredentialInput:
      type: object
      required: [_name, _protocol, _scope, _credentials]
      properties:
        _name:
          type: string
          minLength: 1
          maxLength: 255
        _description:
          type: string
          maxLength: 1000
        _protocol:
          $ref: '#/components/schemas/AuthProtocol'
        _scope:
          $ref: '#/components/schemas/CredentialScope'
        _credentials:
          type: object
          additionalProperties: true
          description: Protocol-specific credentials
        _affinity:
          $ref: '#/components/schemas/CredentialAffinity'
        _tags:
          type: array
          items:
            type: string

    AuthProtocol:
      type: string
      enum:
        - oauth2
        - api_key
        - basic
        - bearer
        - aws_iam
        - azure_sp
        - gcp_sa
        - ssh_key
        - ssh_password
        - certificate
        - kerberos
        - snmp_v2c
        - snmp_v3
        - winrm

    CredentialScope:
      type: string
      enum: [cloud_provider, ssh, api, network, database, container, universal]

    CredentialAffinity:
      type: object
      properties:
        _networks:
          type: array
          items:
            type: string
          description: CIDR network ranges
          example: ["10.0.0.0/8"]
        _hostname_patterns:
          type: array
          items:
            type: string
          description: Regex patterns for hostname matching
          example: [".*\\.prod\\.example\\.com"]
        _os_types:
          type: array
          items:
            type: string
          example: [ubuntu, debian, centos]
        _device_types:
          type: array
          items:
            type: string
          example: [server, virtual-machine]
        _environments:
          type: array
          items:
            type: string
          example: [production, staging]
        _cloud_providers:
          type: array
          items:
            type: string
          example: [aws, azure, gcp]
        _priority:
          type: integer
          minimum: 1
          maximum: 10
          description: Priority when multiple credentials match (higher = preferred)

    CredentialMatchContext:
      type: object
      properties:
        _ip:
          type: string
        _hostname:
          type: string
        _os_type:
          type: string
        _device_type:
          type: string
        _environment:
          type: string
        _cloud_provider:
          type: string
        _required_protocol:
          $ref: '#/components/schemas/AuthProtocol'
        _required_scope:
          $ref: '#/components/schemas/CredentialScope'

    CredentialSet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        credential_ids:
          type: array
          items:
            type: string
            format: uuid
        strategy:
          type: string
          enum: [sequential, parallel, adaptive]
        stop_on_success:
          type: boolean
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    # =========================================================================
    # DISCOVERY
    # =========================================================================
    DiscoveryDefinition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        provider:
          $ref: '#/components/schemas/DiscoveryProvider'
        method:
          $ref: '#/components/schemas/DiscoveryMethod'
        credential_id:
          type: string
          format: uuid
        agent_id:
          type: string
        config:
          type: object
          additionalProperties: true
        schedule:
          type: string
          description: Cron expression
          example: "0 */6 * * *"
        is_active:
          type: boolean
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        created_by:
          type: string

    CreateDiscoveryDefinitionInput:
      type: object
      required: [name, provider, method]
      properties:
        name:
          type: string
        description:
          type: string
        provider:
          $ref: '#/components/schemas/DiscoveryProvider'
        method:
          $ref: '#/components/schemas/DiscoveryMethod'
        credential_id:
          type: string
          format: uuid
        agent_id:
          type: string
        config:
          type: object
        schedule:
          type: string
        is_active:
          type: boolean
        tags:
          type: array
          items:
            type: string

    DiscoveryProvider:
      type: string
      enum:
        - aws
        - azure
        - gcp
        - vmware
        - kubernetes
        - docker
        - nmap
        - ssh
        - snmp
        - active_directory
        - servicenow
        - salesforce
        - datadog
        - pagerduty

    DiscoveryMethod:
      type: string
      enum: [connector, agent]
      description: connector = API-based, agent = network-based

    DiscoveryAgent:
      type: object
      properties:
        agent_id:
          type: string
        hostname:
          type: string
        provider_capabilities:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryProvider'
        reachable_networks:
          type: array
          items:
            type: string
          description: CIDR network ranges
        version:
          type: string
        platform:
          type: string
        arch:
          type: string
        api_endpoint:
          type: string
        status:
          type: string
          enum: [active, inactive, offline, disabled]
        last_heartbeat:
          type: string
          format: date-time
        stats:
          type: object
          properties:
            jobs_completed:
              type: integer
            jobs_failed:
              type: integer
            cis_discovered:
              type: integer
        tags:
          type: array
          items:
            type: string
        registered_at:
          type: string
          format: date-time

    RegisterAgentInput:
      type: object
      required: [agent_id, hostname, provider_capabilities, reachable_networks]
      properties:
        agent_id:
          type: string
        hostname:
          type: string
        provider_capabilities:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveryProvider'
        reachable_networks:
          type: array
          items:
            type: string
        version:
          type: string
        platform:
          type: string
        arch:
          type: string
        api_endpoint:
          type: string
        tags:
          type: array
          items:
            type: string

    # =========================================================================
    # CONNECTORS
    # =========================================================================
    ConnectorRegistryEntry:
      type: object
      properties:
        connector_type:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [discovery, connector]
        tags:
          type: array
          items:
            type: string
        verified:
          type: boolean
        downloads:
          type: integer
        rating:
          type: number

    InstalledConnector:
      type: object
      properties:
        connector_type:
          type: string
        name:
          type: string
        version:
          type: string
        category:
          type: string
        enabled:
          type: boolean
        installed_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # =========================================================================
    # RECONCILIATION
    # =========================================================================
    MatchRequest:
      type: object
      required: [identifiers]
      properties:
        identifiers:
          type: object
          properties:
            external_id:
              type: string
            serial_number:
              type: string
            uuid:
              type: string
            mac_address:
              type: array
              items:
                type: string
            fqdn:
              type: string
            hostname:
              type: string
            ip_address:
              type: array
              items:
                type: string
        source:
          type: string
        ci_type:
          type: string
        environment:
          type: string

    MergeRequest:
      type: object
      required: [name, ci_type, source, source_id, identifiers]
      properties:
        name:
          type: string
        ci_type:
          type: string
        source:
          type: string
        source_id:
          type: string
        identifiers:
          type: object
        attributes:
          type: object
        relationships:
          type: array
        confidence_score:
          type: number
        environment:
          type: string
        status:
          type: string

    ReconciliationConflict:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source_ci:
          $ref: '#/components/schemas/CI'
        target_ci:
          $ref: '#/components/schemas/CI'
        conflicting_fields:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              source_value:
                type: string
              target_value:
                type: string
        status:
          type: string
          enum: [pending, resolved, dismissed]
        detected_at:
          type: string
          format: date-time

    ReconciliationRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        identification_rules:
          type: array
          items:
            type: object
        merge_strategies:
          type: array
          items:
            type: object
        enabled:
          type: boolean

    CreateReconciliationRuleInput:
      type: object
      required: [name, identification_rules]
      properties:
        name:
          type: string
        identification_rules:
          type: array
          items:
            type: object
        merge_strategies:
          type: array
          items:
            type: object
        enabled:
          type: boolean

    # =========================================================================
    # ANOMALIES
    # =========================================================================
    Anomaly:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ci_id:
          type: string
        anomaly_type:
          type: string
          enum: [config_drift, unexpected_change, performance_anomaly, relationship_anomaly]
        severity:
          type: string
          enum: [low, medium, high, critical]
        description:
          type: string
        detected_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [investigating, resolved, false_positive, confirmed, ignored]
        resolved_by:
          type: string
        resolved_at:
          type: string
          format: date-time

    # =========================================================================
    # JOBS
    # =========================================================================
    Job:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        queue:
          type: string
        status:
          type: string
          enum: [waiting, active, completed, failed, delayed]
        progress:
          type: number
        data:
          type: object
        result:
          type: object
        error:
          type: object
        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    # =========================================================================
    # AUDIT
    # =========================================================================
    AuditEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ci_id:
          type: string
        action:
          type: string
          enum: [created, updated, deleted]
        changes:
          type: object
        performed_by:
          type: string
        timestamp:
          type: string
          format: date-time

    # =========================================================================
    # ERROR
    # =========================================================================
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Error type/code
          example: Validation Error
        message:
          type: string
          description: Human-readable error message
          example: Invalid CI type provided
        details:
          type: array
          description: Detailed validation errors
          items:
            type: object
            properties:
              field:
                type: string
              error:
                type: string
