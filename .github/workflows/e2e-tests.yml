name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    # Non-blocking: e2e suite (pnpm-based, full-stack) is WIP / misconfigured.
    # Runs for visibility but must not gate merges until repaired.
    continue-on-error: true
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          E2E_SAVE_LOGS: true
          DEBUG: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/e2e/
          retention-days: 7

      - name: Upload container logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-container-logs
          path: logs/e2e/
          retention-days: 7

      - name: Cleanup Docker resources
        if: always()
        run: |
          docker-compose -f tests/e2e/docker-compose.e2e.yml down -v || true
          docker system prune -af || true
