openapi: 3.0.0

info:
  title: HappyCMDB API
  version: 2.0.0
  description: |
    Comprehensive REST API for HappyCMDB - Enterprise Configuration Management Database (CMDB) platform.

    HappyCMDB v2.0 features:
    - Graph-based CI relationships with Neo4j
    - 43 connectors (17 TypeScript + 26 JSON-only)
    - Unified credential system with affinity matching
    - Discovery agent architecture with smart routing
    - AI-powered anomaly detection and impact analysis
    - Identity resolution and reconciliation

    ## Authentication

    All API endpoints (except `/api/v1/auth/login`) require authentication via:
    - **JWT Token**: Include `Authorization: Bearer <token>` header
    - **API Key**: Include `X-API-Key: <key>` header

    ## Rate Limiting

    Rate limits apply per authentication token/API key:
    - **Standard**: 1000 requests/hour
    - **Burst**: 100 requests/minute

    Rate limit headers included in responses:
    - `X-RateLimit-Limit`: Maximum requests per window
    - `X-RateLimit-Remaining`: Remaining requests
    - `X-RateLimit-Reset`: Unix timestamp when limit resets

  contact:
    name: HappyCMDB Support
    url: http://localhost:8080
    email: support@happycmdb.io
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api/v1
    description: Development server
  - url: http://staging-api.happycmdb.io/api/v1
    description: Staging server
  - url: https://api.happycmdb.io/api/v1
    description: Production server

tags:
  - name: Authentication
    description: User authentication and API key management
  - name: Configuration Items
    description: CRUD operations for Configuration Items (CIs)
  - name: Relationships
    description: Manage relationships between CIs
  - name: Search
    description: Advanced search and query capabilities
  - name: Discovery
    description: Discovery definitions and execution
  - name: Discovery Agents
    description: Agent registration and management
  - name: Credentials
    description: Unified credential system
  - name: Credential Sets
    description: Credential sets with fallback strategies
  - name: Connectors
    description: Connector registry and installation
  - name: Reconciliation
    description: Identity resolution and CI reconciliation
  - name: Analytics
    description: Dashboard statistics and reporting
  - name: Anomalies
    description: AI-powered anomaly detection
  - name: Jobs
    description: Job management and queue monitoring
  - name: Health
    description: Health checks and system status

security:
  - BearerAuth: []
  - ApiKeyAuth: []

paths:
  # =============================================================================
  # AUTHENTICATION
  # =============================================================================
  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate user
      description: Login with username and password to receive JWT token
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT access token
                  expiresIn:
                    type: string
                    example: 24h
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/api-keys:
    post:
      tags: [Authentication]
      summary: Create API key
      description: Generate a new API key for programmatic access
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Descriptive name for the API key
                  example: Production Automation
                expiresAt:
                  type: string
                  format: date-time
                  description: Optional expiration date
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey:
                    type: string
                    description: The API key (only shown once)
                    example: cmdb_prod_abc123xyz789
                  id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags: [Authentication]
      summary: List API keys
      description: Get all API keys for the authenticated user
      operationId: listApiKeys
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKey'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/api-keys/{keyId}:
    delete:
      tags: [Authentication]
      summary: Revoke API key
      description: Permanently revoke an API key
      operationId: revokeApiKey
      parameters:
        - $ref: '#/components/parameters/KeyId'
      responses:
        '204':
          description: API key revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # =============================================================================
  # CONFIGURATION ITEMS (CIs)
  # =============================================================================
  /cis:
    get:
      tags: [Configuration Items]
      summary: List all CIs
      description: Retrieve all Configuration Items with optional filtering
      operationId: getAllCIs
      parameters:
        - name: _type
          in: query
          schema:
            $ref: '#/components/schemas/CIType'
        - name: _status
          in: query
          schema:
            $ref: '#/components/schemas/CIStatus'
        - name: _environment
          in: query
          schema:
            $ref: '#/components/schemas/Environment'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of CIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CI'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Configuration Items]
      summary: Create new CI
      description: Create a new Configuration Item
      operationId: createCI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CIInput'
            examples:
              server:
                summary: Create a server CI
                value:
                  _id: srv-prod-web-01
                  name: Production Web Server 01
                  _type: server
                  _status: active
                  environment: production
                  metadata:
                    hostname: web01.example.com
                    ip_address: 192.168.1.10
                    os: Ubuntu 22.04
                    cpu_cores: 8
                    memory_gb: 32
              application:
                summary: Create an application CI
                value:
                  _id: app-ecommerce-api
                  name: E-Commerce API
                  _type: application
                  _status: active
                  environment: production
                  metadata:
                    version: 2.3.1
                    port: 8080
                    framework: Node.js
      responses:
        '201':
          description: CI created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CI'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: CI with this ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /cis/{id}:
    get:
      tags: [Configuration Items]
      summary: Get CI by ID
      description: Retrieve a specific Configuration Item
      operationId: getCIById
      parameters:
        - $ref: '#/components/parameters/CIId'
      responses:
        '200':
          description: CI details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CI'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Configuration Items]
      summary: Update CI
      description: Update an existing Configuration Item
      operationId: updateCI
      parameters:
        - $ref: '#/components/parameters/CIId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                _name:
                  type: string
                  minLength: 1
                  maxLength: 500
                _type:
                  $ref: '#/components/schemas/CIType'
                _status:
                  $ref: '#/components/schemas/CIStatus'
                _environment:
                  $ref: '#/components/schemas/Environment'
                _metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: CI updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CI'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Configuration Items]
      summary: Delete CI
      description: Delete a Configuration Item (soft delete)
      operationId: deleteCI
      parameters:
        - $ref: '#/components/parameters/CIId'
      responses:
        '204':
          description: CI deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /cis/search:
    post:
      tags: [Configuration Items]
      summary: Search CIs
      description: Simple search across CI names and metadata
      operationId: searchCIs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [_query]
              properties:
                _query:
                  type: string
                  minLength: 1
                  description: Search query string
                  example: web server
                _limit:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  default: 50
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/CI'
                  total:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cis/{id}/relationships:
    get:
      tags: [Configuration Items]
      summary: Get CI relationships
      description: Retrieve all relationships for a CI
      operationId: getCIRelationships
      parameters:
        - $ref: '#/components/parameters/CIId'
        - name: _direction
          in: query
          schema:
            type: string
            enum: [in, out, both]
            default: both
          description: Relationship direction (in=incoming, out=outgoing, both=all)
      responses:
        '200':
          description: CI relationships
          content:
            application/json:
              schema:
                type: object
                properties:
                  inbound:
                    type: array
                    items:
                      $ref: '#/components/schemas/Relationship'
                  outbound:
                    type: array
                    items:
                      $ref: '#/components/schemas/Relationship'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /cis/{id}/dependencies:
    get:
      tags: [Configuration Items]
      summary: Get CI dependencies
      description: Get dependency tree for a CI
      operationId: getCIDependencies
      parameters:
        - $ref: '#/components/parameters/CIId'
        - name: _depth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 5
          description: Maximum traversal depth
      responses:
        '200':
          description: Dependency tree
          content:
            application/json:
              schema:
                type: object
                properties:
                  ci:
                    $ref: '#/components/schemas/CI'
                  dependencies:
                    type: array
                    items:
                      type: object
                      properties:
                        ci:
                          $ref: '#/components/schemas/CI'
                        depth:
                          type: integer
                        path:
                          type: array
                          items:
                            type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /cis/{id}/impact:
    get:
      tags: [Configuration Items]
      summary: Get impact analysis
      description: Analyze potential impact if CI fails
      operationId: getImpactAnalysis
      parameters:
        - $ref: '#/components/parameters/CIId'
        - name: _depth
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 5
      responses:
        '200':
          description: Impact analysis results
          content:
            application/json:
              schema:
                type: object
                properties:
                  affected_cis:
                    type: array
                    items:
                      $ref: '#/components/schemas/CI'
                  impact_score:
                    type: number
                    description: Severity score 0-100
                  criticality:
                    type: string
                    enum: [low, medium, high, critical]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /cis/{id}/audit:
    get:
      tags: [Configuration Items]
      summary: Get CI audit history
      description: Retrieve change history for a CI
      operationId: getCIAuditHistory
      parameters:
        - $ref: '#/components/parameters/CIId'
      responses:
        '200':
          description: Audit trail
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # =============================================================================
  # RELATIONSHIPS
  # =============================================================================
  /relationships:
    get:
      tags: [Relationships]
      summary: List relationships
      description: Retrieve relationships with optional filtering
      operationId: listRelationships
      parameters:
        - name: _type
          in: query
          schema:
            $ref: '#/components/schemas/RelationshipType'
        - name: _from_id
          in: query
          schema:
            type: string
          description: Filter by source CI ID
        - name: _to_id
          in: query
          schema:
            type: string
          description: Filter by target CI ID
        - name: _ci_id
          in: query
          schema:
            type: string
          description: Filter by any CI ID (source or target)
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of relationships
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Relationship'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Relationships]
      summary: Create relationship
      description: Create a relationship between two CIs
      operationId: createRelationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationshipInput'
            examples:
              dependency:
                summary: Application depends on database
                value:
                  _from_id: app-ecommerce-api
                  _to_id: db-postgres-prod
                  _type: DEPENDS_ON
                  properties:
                    connection_string: postgresql://db-postgres-prod:5432/ecommerce
              hosting:
                summary: Server hosts application
                value:
                  _from_id: srv-prod-web-01
                  _to_id: app-ecommerce-api
                  _type: HOSTS
      responses:
        '201':
          description: Relationship created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Relationship'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: One or both CIs not found

  /relationships/{id}:
    delete:
      tags: [Relationships]
      summary: Delete relationship
      description: Remove a relationship between CIs
      operationId: deleteRelationship
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Relationship ID or query string from_id/to_id/type
      responses:
        '204':
          description: Relationship deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /relationships/type/{type}:
    get:
      tags: [Relationships]
      summary: Get relationships by type
      description: Retrieve all relationships of a specific type
      operationId: getRelationshipsByType
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/RelationshipType'
      responses:
        '200':
          description: Relationships of specified type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Relationship'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # =============================================================================
  # SEARCH
  # =============================================================================
  /search/advanced:
    post:
      tags: [Search]
      summary: Advanced search
      description: Search CIs with multiple filters
      operationId: advancedSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [_query]
              properties:
                _query:
                  type: string
                  minLength: 1
                _type:
                  $ref: '#/components/schemas/CIType'
                _status:
                  $ref: '#/components/schemas/CIStatus'
                _environment:
                  $ref: '#/components/schemas/Environment'
                _metadata_filters:
                  type: object
                  additionalProperties: true
                  description: Filter by metadata fields
                  example:
                    os: Ubuntu
                    cpu_cores: 8
                _limit:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  default: 50
                _offset:
                  type: integer
                  minimum: 0
                  default: 0
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/CI'
                  total:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /search/fulltext:
    post:
      tags: [Search]
      summary: Full-text search
      description: Search using Neo4j full-text index
      operationId: fulltextSearch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [_query]
              properties:
                _query:
                  type: string
                  minLength: 1
                _limit:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  default: 50
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CI'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /search/relationships:
    post:
      tags: [Search]
      summary: Search by relationship pattern
      description: Find CIs matching relationship criteria
      operationId: searchByRelationship
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [_ci_type, _relationship_type, _related_ci_type]
              properties:
                _ci_type:
                  $ref: '#/components/schemas/CIType'
                _relationship_type:
                  $ref: '#/components/schemas/RelationshipType'
                _related_ci_type:
                  $ref: '#/components/schemas/CIType'
                _limit:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  default: 50
      responses:
        '200':
          description: Matching CIs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CI'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /search/orphaned:
    get:
      tags: [Search]
      summary: Get orphaned CIs
      description: Find CIs with no relationships
      operationId: getOrphanedCIs
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Orphaned CIs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CI'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # =============================================================================
  # CREDENTIALS
  # =============================================================================
  /credentials:
    get:
      tags: [Credentials]
      summary: List credentials
      description: Get all credentials (summaries only, no secrets)
      operationId: listCredentials
      parameters:
        - name: _protocol
          in: query
          schema:
            $ref: '#/components/schemas/AuthProtocol'
        - name: _scope
          in: query
          schema:
            $ref: '#/components/schemas/CredentialScope'
        - name: _tags
          in: query
          schema:
            type: string
          description: Comma-separated tags
        - name: _created_by
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CredentialSummary'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Credentials]
      summary: Create credential
      description: Create a new credential with encrypted storage
      operationId: createCredential
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCredentialInput'
            examples:
              aws_iam:
                summary: AWS IAM credentials
                value:
                  _name: AWS Production Account
                  _description: Main AWS account for production
                  _protocol: aws_iam
                  _scope: cloud_provider
                  _credentials:
                    access_key_id: AKIAIOSFODNN7EXAMPLE
                    secret_access_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
                    region: us-east-1
                  _affinity:
                    _cloud_providers: [aws]
                    _environments: [production]
                    _priority: 10
                  _tags: [aws, production, primary]
              ssh_key:
                summary: SSH key credentials
                value:
                  _name: Production Servers SSH Key
                  _protocol: ssh_key
                  _scope: ssh
                  _credentials:
                    username: ubuntu
                    private_key: "-----BEGIN RSA PRIVATE KEY-----\n..."
                  _affinity:
                    _networks: ["10.0.0.0/8"]
                    _os_types: [ubuntu, debian]
                    _priority: 8
      responses:
        '201':
          description: Credential created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /credentials/{id}:
    get:
      tags: [Credentials]
      summary: Get credential by ID
      description: Retrieve a specific credential (secrets redacted)
      operationId: getCredentialById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Credential details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Credentials]
      summary: Update credential
      description: Update credential properties
      operationId: updateCredential
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                _name:
                  type: string
                  minLength: 1
                  maxLength: 255
                _description:
                  type: string
                  maxLength: 1000
                _credentials:
                  type: object
                  additionalProperties: true
                _affinity:
                  $ref: '#/components/schemas/CredentialAffinity'
                _tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Credential updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Credential'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Credentials]
      summary: Delete credential
      description: Permanently delete a credential
      operationId: deleteCredential
      parameters:
        - name: id
          in: path
          required: true
          schema:
