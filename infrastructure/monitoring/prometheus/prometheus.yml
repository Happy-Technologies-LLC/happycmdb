# Prometheus Configuration
# Main configuration file for Prometheus server

global:
  # How frequently to scrape targets
  scrape_interval: 15s

  # How long until a scrape request times out
  scrape_timeout: 10s

  # How frequently to evaluate rules
  evaluation_interval: 15s

  # External labels to attach to any time series or alerts
  external_labels:
    cluster: 'cmdb-production'
    environment: '${ENVIRONMENT:-production}'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
      timeout: 10s

# Load alerting rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          service: 'prometheus'

  # CMDB API Server
  - job_name: 'cmdb-api-server'
    metrics_path: '/metrics'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'api-server:3000'
        labels:
          service: 'api-server'
          component: 'api'
    # Service discovery for multiple API server instances
    dns_sd_configs:
      - names:
          - 'api-server.cmdb.svc.cluster.local'
        type: 'A'
        port: 3000
        refresh_interval: 30s

  # CMDB Discovery Engine
  - job_name: 'cmdb-discovery-engine'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'discovery-engine:3001'
        labels:
          service: 'discovery-engine'
          component: 'discovery'
    dns_sd_configs:
      - names:
          - 'discovery-engine.cmdb.svc.cluster.local'
        type: 'A'
        port: 3001
        refresh_interval: 30s

  # CMDB ETL Processor
  - job_name: 'cmdb-etl-processor'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'etl-processor:3002'
        labels:
          service: 'etl-processor'
          component: 'etl'
    dns_sd_configs:
      - names:
          - 'etl-processor.cmdb.svc.cluster.local'
        type: 'A'
        port: 3002
        refresh_interval: 30s

  # CMDB Discovery Agents
  - job_name: 'cmdb-agents'
    metrics_path: '/metrics'
    scrape_interval: 60s
    static_configs:
      - targets:
          - 'agent-1:3003'
          - 'agent-2:3003'
        labels:
          service: 'agent'
          component: 'discovery'
    # File-based service discovery for dynamic agents
    file_sd_configs:
      - files:
          - '/etc/prometheus/sd/agents.json'
        refresh_interval: 60s

  # Neo4j Monitoring
  - job_name: 'neo4j'
    metrics_path: '/metrics'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'neo4j:2004'
        labels:
          service: 'neo4j'
          component: 'database'

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'postgres-exporter:9187'
        labels:
          service: 'postgres'
          component: 'database'

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets:
          - 'redis-exporter:9121'
        labels:
          service: 'redis'
          component: 'cache'

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    scrape_interval: 15s
    static_configs:
      - targets:
          - 'node-exporter:9100'
        labels:
          service: 'node-exporter'
          component: 'system'
    dns_sd_configs:
      - names:
          - 'node-exporter.monitoring.svc.cluster.local'
        type: 'A'
        port: 9100
        refresh_interval: 30s

  # Blackbox Exporter (health check probes)
  - job_name: 'blackbox'
    metrics_path: '/probe'
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - 'http://api-server:3000/health'
          - 'http://api-server:3000/ready'
          - 'http://discovery-engine:3001/health'
          - 'http://etl-processor:3002/health'
          - 'http://metabase:3000/api/health'
        labels:
          component: 'health-check'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # HappyCMDB v3.0 - ITIL Service Manager Metrics
  - job_name: 'cmdb-itil-manager'
    metrics_path: '/metrics/itil'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'api-server:3000'
        labels:
          service: 'itil-service-manager'
          component: 'itil'
          framework: 'itil-v4'

  # HappyCMDB v3.0 - TBM Cost Engine Metrics
  - job_name: 'cmdb-tbm-engine'
    metrics_path: '/metrics/tbm'
    scrape_interval: 60s
    static_configs:
      - targets:
          - 'api-server:3000'
        labels:
          service: 'tbm-cost-engine'
          component: 'tbm'
          framework: 'tbm-v5'

  # HappyCMDB v3.0 - BSM Impact Engine Metrics
  - job_name: 'cmdb-bsm-engine'
    metrics_path: '/metrics/bsm'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'api-server:3000'
        labels:
          service: 'bsm-impact-engine'
          component: 'bsm'
          framework: 'bsm'

  # HappyCMDB v3.0 - AI Discovery Metrics
  - job_name: 'cmdb-ai-discovery'
    metrics_path: '/metrics/ai'
    scrape_interval: 60s
    static_configs:
      - targets:
          - 'discovery-engine:3001'
        labels:
          service: 'ai-discovery'
          component: 'discovery'
          feature: 'ai-powered'

  # HappyCMDB v3.0 - Unified Framework Metrics
  - job_name: 'cmdb-unified-framework'
    metrics_path: '/metrics/unified'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'api-server:3000'
        labels:
          service: 'unified-framework'
          component: 'integration'

  # Kafka Metrics (JMX Exporter)
  - job_name: 'kafka-jmx'
    static_configs:
      - targets:
          - 'kafka-0.kafka:7071'
          - 'kafka-1.kafka:7071'
          - 'kafka-2.kafka:7071'
        labels:
          service: 'kafka'
          component: 'event-streaming'
          cluster: 'happycmdb-kafka'

  # Metabase Analytics Platform
  - job_name: 'metabase'
    metrics_path: '/api/health'
    scrape_interval: 60s
    static_configs:
      - targets:
          - 'metabase:3000'
        labels:
          service: 'metabase'
          component: 'analytics'

# Recording rules for aggregations
# These pre-compute frequently used queries
recording_rules:
  - name: 'api_aggregations'
    interval: 30s
    rules:
      # Overall request rate
      - record: job:cmdb_http_requests:rate5m
        expr: sum(rate(cmdb_http_requests_total[5m]))

      # Error rate percentage
      - record: job:cmdb_http_error_rate:rate5m
        expr: |
          sum(rate(cmdb_http_requests_total{status_code=~"5.."}[5m]))
          /
          sum(rate(cmdb_http_requests_total[5m])) * 100

      # P95 latency
      - record: job:cmdb_http_request_duration:p95
        expr: histogram_quantile(0.95, rate(cmdb_http_request_duration_seconds_bucket[5m]))

  - name: 'discovery_aggregations'
    interval: 1m
    rules:
      # CIs discovered per provider
      - record: provider:cmdb_cis_discovered:rate5m
        expr: sum by (provider) (rate(cmdb_cis_discovered_total[5m]))

      # Discovery success rate
      - record: provider:cmdb_discovery_success_rate:rate5m
        expr: |
          sum by (provider) (rate(cmdb_discovery_jobs_total{status="success"}[5m]))
          /
          sum by (provider) (rate(cmdb_discovery_jobs_total[5m])) * 100

  - name: 'etl_aggregations'
    interval: 1m
    rules:
      # ETL throughput
      - record: job_type:cmdb_etl_throughput:rate5m
        expr: sum by (job_type) (rate(cmdb_etl_records_processed_total[5m]))

      # ETL success rate
      - record: job_type:cmdb_etl_success_rate:rate5m
        expr: |
          sum by (job_type) (rate(cmdb_etl_jobs_total{status="success"}[5m]))
          /
          sum by (job_type) (rate(cmdb_etl_jobs_total[5m])) * 100

  # v3.0 - ITIL Metrics Aggregations
  - name: 'itil_aggregations'
    interval: 1m
    rules:
      # Incident creation rate
      - record: priority:cmdb_itil_incidents_created:rate5m
        expr: sum by (priority) (rate(cmdb_itil_incidents_created_total[5m]))

      # Change success rate
      - record: risk:cmdb_itil_changes_success_rate:rate5m
        expr: |
          sum by (risk_level) (rate(cmdb_itil_changes_completed_total{status="success"}[5m]))
          /
          sum by (risk_level) (rate(cmdb_itil_changes_completed_total[5m])) * 100

      # Drift detection rate
      - record: cmdb_itil_drift_detection_rate:rate5m
        expr: rate(cmdb_itil_drift_detected_total[5m])

  # v3.0 - TBM Cost Metrics Aggregations
  - name: 'tbm_aggregations'
    interval: 5m
    rules:
      # Total IT spend by tower
      - record: tower:cmdb_tbm_total_cost:sum
        expr: sum by (tower) (cmdb_tbm_resource_cost_monthly)

      # Cost allocation efficiency
      - record: cmdb_tbm_allocation_efficiency:ratio
        expr: |
          sum(cmdb_tbm_costs_allocated_total)
          /
          sum(cmdb_tbm_costs_total) * 100

      # Cloud cost trends
      - record: provider:cmdb_tbm_cloud_cost:rate1h
        expr: rate(cmdb_tbm_cloud_cost_total[1h]) by (provider)

  # v3.0 - BSM Impact Metrics Aggregations
  - name: 'bsm_aggregations'
    interval: 1m
    rules:
      # Critical services count
      - record: tier:cmdb_bsm_services:count
        expr: count by (tier) (cmdb_bsm_service_criticality)

      # Revenue at risk
      - record: cmdb_bsm_revenue_at_risk:sum
        expr: sum(cmdb_bsm_revenue_at_risk_dollars)

      # Blast radius calculation rate
      - record: cmdb_bsm_blast_radius_calculations:rate5m
        expr: rate(cmdb_bsm_blast_radius_calculations_total[5m])

  # v3.0 - AI Discovery Metrics Aggregations
  - name: 'ai_discovery_aggregations'
    interval: 5m
    rules:
      # AI discovery cost per day
      - record: provider:cmdb_ai_discovery_cost_daily:sum
        expr: sum by (provider) (increase(cmdb_ai_discovery_cost_dollars[24h]))

      # Pattern learning success rate
      - record: cmdb_ai_pattern_learning_success_rate:rate5m
        expr: |
          rate(cmdb_ai_patterns_learned_total{status="success"}[5m])
          /
          rate(cmdb_ai_patterns_learned_total[5m]) * 100

      # Anomaly detection rate
      - record: severity:cmdb_ai_anomalies_detected:rate5m
        expr: sum by (severity) (rate(cmdb_ai_anomalies_detected_total[5m]))

  # v3.0 - Kafka Event Streaming Aggregations
  - name: 'kafka_aggregations'
    interval: 1m
    rules:
      # Event throughput by topic
      - record: topic:cmdb_kafka_events:rate5m
        expr: sum by (topic) (rate(kafka_topic_partition_current_offset[5m]))

      # Consumer lag
      - record: consumer_group:cmdb_kafka_consumer_lag:max
        expr: max by (consumer_group) (kafka_consumer_lag_records)

      # Event processing latency
      - record: topic:cmdb_kafka_latency_ms:p95
        expr: histogram_quantile(0.95, rate(kafka_event_processing_duration_seconds_bucket[5m])) by (topic)

# Remote write configuration (for long-term storage)
remote_write:
  - url: '${REMOTE_WRITE_URL}'
    queue_config:
      capacity: 10000
      max_shards: 50
      min_shards: 1
      max_samples_per_send: 5000
      batch_send_deadline: 5s
      min_backoff: 30ms
      max_backoff: 100ms
    # Optional: write only specific metrics to remote storage
    write_relabel_configs:
      - source_labels: [__name__]
        regex: 'cmdb_.*'
        action: keep

# Storage configuration
storage:
  tsdb:
    # Retention period
    retention.time: 30d
    # Retention size
    retention.size: 50GB
