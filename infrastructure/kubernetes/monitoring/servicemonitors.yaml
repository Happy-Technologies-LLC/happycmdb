# ServiceMonitor CRDs for Prometheus Operator
# These enable automatic service discovery and metrics scraping

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-server
  namespace: happycmdb-cmdb
  labels:
    app: api-server
    prometheus: happycmdb
spec:
  selector:
    matchLabels:
      app: api-server
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: discovery-engine
  namespace: happycmdb-cmdb
  labels:
    app: discovery-engine
    prometheus: happycmdb
spec:
  selector:
    matchLabels:
      app: discovery-engine
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
---
apiVersion: monitoring.coreos.com/v1
