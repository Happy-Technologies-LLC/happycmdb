                  $ref: '#/components/schemas/CredentialSet'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Credential Sets]
      summary: Create credential set
      description: Create a new credential set with fallback strategy
      operationId: createCredentialSet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [_name, _credential_ids]
              properties:
                _name:
                  type: string
                  minLength: 1
                  maxLength: 255
                _description:
                  type: string
                  maxLength: 1000
                _credential_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
                _strategy:
                  type: string
                  enum: [sequential, parallel, adaptive]
                  default: sequential
                _stop_on_success:
                  type: boolean
                  default: true
                _tags:
                  type: array
                  items:
                    type: string
            example:
              _name: Production SSH Keys
              _description: Fallback SSH keys for production servers
              _credential_ids:
                - 123e4567-e89b-12d3-a456-426614174000
                - 223e4567-e89b-12d3-a456-426614174001
              _strategy: sequential
              _stop_on_success: true
              _tags: [ssh, production]
      responses:
        '201':
          description: Credential set created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialSet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

