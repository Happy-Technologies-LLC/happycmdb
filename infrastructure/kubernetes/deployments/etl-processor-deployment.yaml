apiVersion: apps/v1
kind: Deployment
metadata:
  name: etl-processor
  namespace: happycmdb-cmdb
  labels:
    app: etl-processor
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: etl-processor
  template:
    metadata:
      labels:
        app: etl-processor
        component: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - etl-processor
                topologyKey: kubernetes.io/hostname
      containers:
        - name: etl-processor
          image: happycmdb/etl-processor:latest
          imagePullPolicy: Always
          env:
            - name: NODE_ENV
              value: "production"
            - name: POSTGRES_HOST
              value: "postgres-primary.happycmdb-cmdb.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "cmdb"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmdb-secrets
                  key: postgres-password
            - name: KAFKA_BROKERS
              value: "kafka-0.kafka.happycmdb-cmdb.svc.cluster.local:9092,kafka-1.kafka.happycmdb-cmdb.svc.cluster.local:9092,kafka-2.kafka.happycmdb-cmdb.svc.cluster.local:9092"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: etl-processor
  namespace: happycmdb-cmdb
  labels:
    app: etl-processor
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: metrics
  selector:
    app: etl-processor
